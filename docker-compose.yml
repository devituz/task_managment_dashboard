services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        container_name: ${DOCKER_CONTAINER_NAME}_app
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        networks:
            - devituz
        environment:
            APP_ENV: local
            WWWUSER: '${WWWUSER:-1000}'
            XDEBUG_MODE: '${XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${XDEBUG_CONFIG:-client_host=host.docker.internal}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ${DOCKER_CONTAINER_NAME}_scheduler
        command: sh -c "while [ true ]; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
        volumes:
            - .:/var/www/html
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - devituz
        restart: unless-stopped

    nginx:
        image: nginx:1.25-alpine
        container_name: ${DOCKER_CONTAINER_NAME}_nginx
        ports:
            - '${APP_PORT:-8000}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - devituz
        restart: unless-stopped

    horizon:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        container_name: ${DOCKER_CONTAINER_NAME}_horizon
        command: php artisan horizon
        volumes:
            - .:/var/www/html
        networks:
            - devituz
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: ${DOCKER_CONTAINER_NAME}_postgres
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks:
            - devituz
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

