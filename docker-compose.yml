    redis:
        image: redis:7.2-alpine
        container_name: ${DOCKER_CONTAINER_NAME}_redis
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - redis-data:/data
        command: [
            "redis-server",
            "--appendonly", "yes",
            "--maxmemory", "256mb",
            "--maxmemory-policy", "allkeys-lru",
            "--replica-read-only", "no"
        ]
        networks:
            - devituz
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    go-ws:
        build:
            context: ./go-ws
        container_name: delgo_go_ws
        ports:
            - "8081:8081"
        depends_on:
            redis:
                condition: service_healthy
        networks:
            - devituz



volumes:
    postgres-data:
    redis-data:


networks:
    devituz:
        driver: bridge
